<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue + PixiJS + GSAP Limbo Demo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11151c;
        --panel: #1b222c;
        --panel-2: #202a36;
        --line: #344050;
        --text: #f4f7fb;
        --muted: #9daaba;
        --green: #22c55e;
        --red: #ef4444;
        --amber: #f59e0b;
        --cyan: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 22% 10%, rgba(56, 189, 248, 0.18), transparent 28%),
          radial-gradient(circle at 78% 0%, rgba(245, 158, 11, 0.14), transparent 24%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      #app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(17, 21, 28, 0.72);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: #071018;
        background: linear-gradient(135deg, var(--cyan), var(--green));
        font-weight: 900;
      }

      .status {
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 14px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 18px rgba(34, 197, 94, 0.7);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 330px) minmax(0, 1fr);
        gap: 18px;
        padding: 18px;
        min-height: 0;
      }

      .controls,
      .stage-shell {
        border: 1px solid rgba(255, 255, 255, 0.09);
        background: rgba(27, 34, 44, 0.88);
      }

      .controls {
        border-radius: 8px;
        padding: 18px;
        align-self: start;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
      }

      .input-wrap {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-2);
        padding: 10px 12px;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 0;
        outline: 0;
        color: var(--text);
        background: transparent;
      }

      .suffix {
        color: var(--muted);
        font-size: 13px;
      }

      .quick-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 16px;
      }

      .quick-row button,
      .primary,
      .secondary {
        height: 42px;
        border: 0;
        border-radius: 7px;
        color: var(--text);
        cursor: pointer;
      }

      .quick-row button {
        background: #2a3544;
      }

      .primary {
        width: 100%;
        height: 50px;
        color: #06120b;
        background: linear-gradient(135deg, #86efac, var(--green));
        font-weight: 800;
      }

      .primary:disabled,
      .secondary:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .secondary {
        width: 100%;
        margin-top: 10px;
        background: linear-gradient(135deg, #fde68a, var(--amber));
        color: #1b1304;
        font-weight: 800;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 18px;
      }

      .stat {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
      }

      .history {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .chip {
        border-radius: 999px;
        padding: 6px 10px;
        background: #263140;
        color: var(--muted);
        font-size: 13px;
      }

      .chip.win {
        color: #bbf7d0;
        background: rgba(34, 197, 94, 0.16);
      }

      .stage-shell {
        position: relative;
        overflow: hidden;
        border-radius: 8px;
        min-height: 560px;
      }

      .stage-head {
        position: absolute;
        z-index: 2;
        top: 18px;
        left: 18px;
        right: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        pointer-events: none;
      }

      .multiplier {
        font-size: clamp(48px, 9vw, 112px);
        line-height: 0.9;
        font-weight: 900;
        letter-spacing: 0;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.38);
      }

      .round-state {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.28);
        color: var(--muted);
        font-size: 13px;
      }

      #pixi-stage {
        position: absolute;
        inset: 0;
      }

      #pixi-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      @media (max-width: 860px) {
        .topbar {
          padding: 0 14px;
        }

        .layout {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .controls {
          order: 2;
        }

        .stage-shell {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">LX</div>
          <div>Limbo Pixi Demo</div>
        </div>
        <div class="status">
          <span class="dot"></span>
          Vue + PixiJS + GSAP
        </div>
      </header>

      <main class="layout">
        <aside class="controls">
          <div class="field">
            <label for="bet">Bet Amount</label>
            <div class="input-wrap">
              <input id="bet" v-model.number="betAmount" type="number" min="1" step="1" />
              <span class="suffix">IDR</span>
            </div>
          </div>

          <div class="field">
            <label for="cashout">Auto Cash Out</label>
            <div class="input-wrap">
              <input id="cashout" v-model.number="cashoutAt" type="number" min="1.01" step="0.01" />
              <span class="suffix">x</span>
            </div>
          </div>

          <div class="quick-row">
            <button type="button" @click="betAmount = Math.max(1, Math.floor(betAmount / 2))">1/2</button>
            <button type="button" @click="betAmount = betAmount * 2">2x</button>
            <button type="button" @click="cashoutAt = 2">2.00x</button>
          </div>

          <button class="primary" type="button" :disabled="isRunning" @click="startRound">
            {{ isRunning ? 'ROUND RUNNING' : 'BET' }}
          </button>
          <button class="secondary" type="button" :disabled="!isRunning || cashedOut" @click="cashOut">
            CASH OUT
          </button>

          <section class="stats">
            <div class="stat">
              <span>Balance</span>
              <strong>{{ balance.toLocaleString() }}</strong>
            </div>
            <div class="stat">
              <span>Potential</span>
              <strong>{{ potentialWin.toLocaleString() }}</strong>
            </div>
          </section>

          <div class="history">
            <span v-for="item in history" :key="item.id" class="chip" :class="{ win: item.win }">
              {{ item.value.toFixed(2) }}x
            </span>
          </div>
        </aside>

        <section class="stage-shell">
          <div class="stage-head">
            <div class="multiplier">{{ multiplier.toFixed(2) }}x</div>
            <div class="round-state">{{ roundLabel }}</div>
          </div>
          <div id="pixi-stage" ref="stageEl"></div>
        </section>
      </main>
    </div>

    <script>
      const { createApp, computed, nextTick, onBeforeUnmount, onMounted, ref } = Vue;

      createApp({
        setup() {
          const stageEl = ref(null);
          const betAmount = ref(1000);
          const cashoutAt = ref(2.0);
          const balance = ref(100000);
          const multiplier = ref(1);
          const isRunning = ref(false);
          const cashedOut = ref(false);
          const roundLabel = ref("WAITING");
          const history = ref([
            { id: 1, value: 1.22, win: false },
            { id: 2, value: 4.71, win: true },
            { id: 3, value: 2.03, win: true },
            { id: 4, value: 1.08, win: false },
          ]);

          let app;
          let rocket;
          let curve;
          let trail;
          let grid;
          let pixiText;
          let roundTween;
          let pulseTween;
          let resizeObserver;

          const potentialWin = computed(() => Math.floor(betAmount.value * multiplier.value));

          function buildPixiStage() {
            app = new PIXI.Application();
            return app
              .init({
                backgroundAlpha: 0,
                antialias: true,
                autoDensity: true,
                resizeTo: stageEl.value,
              })
              .then(() => {
                stageEl.value.appendChild(app.canvas);
                window.__PIXI_APP__ = app;

                grid = new PIXI.Graphics();
                curve = new PIXI.Graphics();
                trail = new PIXI.Graphics();
                rocket = new PIXI.Container();

                const body = new PIXI.Graphics()
                  .roundRect(-28, -15, 56, 30, 8)
                  .fill({ color: 0x38bdf8 })
                  .roundRect(8, -9, 16, 18, 5)
                  .fill({ color: 0xe0f2fe })
                  .moveTo(-28, -15)
                  .lineTo(-48, 0)
                  .lineTo(-28, 15)
                  .closePath()
                  .fill({ color: 0x22c55e });

                const flame = new PIXI.Graphics()
                  .moveTo(-45, -8)
                  .lineTo(-74, 0)
                  .lineTo(-45, 8)
                  .closePath()
                  .fill({ color: 0xf59e0b });
                flame.name = "flame";

                pixiText = new PIXI.Text({
                  text: "PixiJS canvas layer",
                  style: {
                    fill: 0x9daaba,
                    fontFamily: "Inter, Arial",
                    fontSize: 14,
                  },
                });

                rocket.addChild(flame, body);
                app.stage.addChild(grid, trail, curve, rocket, pixiText);

                drawScene();
                pulseTween = gsap.to(flame.scale, {
                  x: 1.25,
                  y: 1.25,
                  duration: 0.16,
                  repeat: -1,
                  yoyo: true,
                  ease: "sine.inOut",
                });

                resizeObserver = new ResizeObserver(drawScene);
                resizeObserver.observe(stageEl.value);
              });
          }

          function drawScene(progress = Math.min((multiplier.value - 1) / 4, 1)) {
            if (!app) return;

            const width = app.screen.width;
            const height = app.screen.height;
            const pad = Math.max(28, Math.min(width, height) * 0.08);
            const baseY = height - pad;
            const endX = pad + (width - pad * 2) * progress;
            const endY = baseY - (height - pad * 2) * Math.pow(progress, 0.72);

            grid.clear();
            grid.setStrokeStyle({ width: 1, color: 0xffffff, alpha: 0.06 });
            for (let x = pad; x < width; x += 72) {
              grid.moveTo(x, pad);
              grid.lineTo(x, baseY);
            }
            for (let y = pad; y < baseY; y += 54) {
              grid.moveTo(pad, y);
              grid.lineTo(width - pad, y);
            }
            grid.stroke();

            trail.clear();
            trail.setStrokeStyle({ width: 10, color: 0x38bdf8, alpha: 0.14 });
            trail.moveTo(pad, baseY);
            trail.quadraticCurveTo(width * 0.38, baseY - height * 0.12, endX, endY);
            trail.stroke();

            curve.clear();
            curve.setStrokeStyle({ width: 4, color: 0x22c55e, alpha: 0.9 });
            curve.moveTo(pad, baseY);
            curve.quadraticCurveTo(width * 0.38, baseY - height * 0.12, endX, endY);
            curve.stroke();

            rocket.x = endX;
            rocket.y = endY;
            rocket.rotation = -0.38 - progress * 0.34;

            pixiText.x = pad;
            pixiText.y = height - 28;
          }

          function resetRound() {
            multiplier.value = 1;
            cashedOut.value = false;
            roundLabel.value = "WAITING";
            drawScene(0);
          }

          function startRound() {
            if (isRunning.value || betAmount.value <= 0 || betAmount.value > balance.value) return;

            balance.value -= betAmount.value;
            isRunning.value = true;
            cashedOut.value = false;
            roundLabel.value = "FLYING";
            multiplier.value = 1;

            const crashAt = Number((1.05 + Math.random() * 5.2).toFixed(2));
            const state = { value: 1 };

            if (roundTween) roundTween.kill();
            roundTween = gsap.to(state, {
              value: crashAt,
              duration: 1.8 + Math.random() * 1.4,
              ease: "power2.in",
              onUpdate: () => {
                multiplier.value = state.value;
                drawScene(Math.min((state.value - 1) / 4, 1));

                if (!cashedOut.value && state.value >= cashoutAt.value) {
                  cashOut();
                }
              },
              onComplete: () => {
                endRound(crashAt);
              },
            });
          }

          function cashOut() {
            if (!isRunning.value || cashedOut.value) return;
            cashedOut.value = true;
            const win = Math.floor(betAmount.value * multiplier.value);
            balance.value += win;
            roundLabel.value = `CASHED ${multiplier.value.toFixed(2)}x`;
          }

          function endRound(crashAt) {
            isRunning.value = false;
            roundLabel.value = cashedOut.value ? "PAID" : "CRASHED";
            history.value = [
              { id: Date.now(), value: crashAt, win: cashedOut.value },
              ...history.value,
            ].slice(0, 12);

            gsap.to(rocket, {
              alpha: 0,
              x: app.screen.width + 120,
              y: -80,
              duration: 0.45,
              ease: "power2.in",
              onComplete: () => {
                rocket.alpha = 1;
                nextTick(resetRound);
              },
            });
          }

          onMounted(buildPixiStage);

          onBeforeUnmount(() => {
            if (roundTween) roundTween.kill();
            if (pulseTween) pulseTween.kill();
            if (resizeObserver) resizeObserver.disconnect();
            if (app) app.destroy(true);
          });

          return {
            balance,
            betAmount,
            cashoutAt,
            cashedOut,
            history,
            isRunning,
            multiplier,
            potentialWin,
            roundLabel,
            stageEl,
            cashOut,
            startRound,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
